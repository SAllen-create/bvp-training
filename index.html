<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BVP AI Policy Training Module</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  html { -webkit-text-size-adjust: 100%; }
  body {
    min-height: 100vh; min-height: 100dvh;
    background: linear-gradient(160deg, #f7faf7 0%, #e8ede8 100%);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 12px 8px; font-family: 'DM Sans', sans-serif;
  }
  @media(min-width:480px){ body { padding: 24px 16px; } }
  .shell {
    width: 100%; max-width: 680px; background: #fff;
    border-radius: 16px; box-shadow: 0 8px 40px rgba(27,67,50,0.08);
    overflow: hidden; display: flex; flex-direction: column;
    max-height: calc(100vh - 24px); max-height: calc(100dvh - 24px);
  }
  @media(min-width:480px){ .shell { border-radius: 20px; } }
  .header { background: linear-gradient(135deg, #1b4332, #2d6a4f); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  @media(min-width:480px){ .header { padding: 20px 28px; } }
  .header-sub { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #95d5b2; text-transform: uppercase; margin-bottom: 2px; }
  @media(min-width:480px){ .header-sub { font-size: 11px; margin-bottom: 4px; } }
  .header-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #fff; }
  @media(min-width:480px){ .header-title { font-size: 18px; } }
  .progress-wrap { padding: 10px 20px 0; flex-shrink: 0; }
  @media(min-width:480px){ .progress-wrap { padding: 12px 32px 0; } }
  .progress-labels { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 11px; color: #7a8a7a; letter-spacing: 0.04em; }
  .progress-track { height: 6px; background: #e8ede8; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #2d6a4f, #40916c); border-radius: 3px; transition: width 0.5s ease; }
  .dots { display: flex; gap: 5px; justify-content: center; padding: 10px 8px; flex-wrap: wrap; flex-shrink: 0; }
  .dot { width: 9px; height: 9px; border-radius: 5px; border: none; cursor: pointer; transition: all 0.3s ease; background: #d8e2dc; }
  .dot.visited { background: #95d5b2; } .dot.active { width: 24px; background: #2d6a4f; }
  @media(min-width:480px){ .dot { width: 10px; height: 10px; } .dot.active { width: 28px; } }
  .content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .slide { padding: 24px 20px; }
  @media(min-width:480px){ .slide { padding: 32px 28px; } }
  .slide.center { text-align: center; padding: 32px 20px; }
  @media(min-width:480px){ .slide.center { padding: 40px 28px; } }

  /* Section illustration banner */
  .section-banner { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; padding: 16px 20px; background: linear-gradient(135deg, #f0f7f0, #e8f5e8); border-radius: 12px; }
  @media(min-width:480px){ .section-banner { gap: 20px; padding: 20px 24px; margin-bottom: 24px; } }
  .section-banner svg { flex-shrink: 0; }
  .section-banner h2 { margin-bottom: 0; }

  /* Scenario illustration */
  .scenario-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
  .scenario-header-text { flex: 1; }
  .scenario-icon { flex-shrink: 0; width: 64px; height: 64px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  @media(max-width:400px){ .scenario-icon { width: 48px; height: 48px; } .scenario-icon svg { width: 28px; height: 28px; } }

  h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: #1b4332; line-height: 1.2; margin-bottom: 8px; }
  @media(min-width:480px){ h1 { font-size: 30px; } }
  h2 { font-family: 'Playfair Display', serif; font-size: 21px; color: #1b4332; margin-bottom: 16px; }
  @media(min-width:480px){ h2 { font-size: 24px; margin-bottom: 20px; } }
  .subtitle { color: #52796f; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  @media(min-width:480px){ .subtitle { font-size: 15px; margin-bottom: 32px; } }
  .body-text { font-size: 14px; color: #344e41; line-height: 1.7; margin-bottom: 20px; white-space: pre-line; }
  @media(min-width:480px){ .body-text { font-size: 15px; } }
  .info-box { background: #f0f7f0; border-radius: 12px; padding: 20px; max-width: 420px; margin: 0 auto 28px; text-align: left; }
  .info-box p { font-size: 14px; color: #2d6a4f; line-height: 1.6; margin-bottom: 14px; }
  .info-box .meta { font-size: 13px; color: #52796f; margin-bottom: 4px; }
  .name-wrap { max-width: 320px; margin: 0 auto 24px; }
  .name-wrap label { display: block; font-size: 13px; color: #52796f; margin-bottom: 8px; text-align: left; }
  .name-input { width: 100%; padding: 12px 16px; border: 2px solid #d8e2dc; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .name-input:focus { border-color: #40916c; }
  .btn-primary { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; padding: 14px 36px; background: linear-gradient(135deg, #2d6a4f, #40916c); color: #fff; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 0.02em; transition: transform 0.15s, box-shadow 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-continue { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 28px; background: #2d6a4f; color: #fff; border: none; border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .btn-continue:active { background: #245c43; }
  .bullet-list { list-style: none; padding: 0; margin: 0 0 24px; }

  @media(min-width:480px){ .callout { padding: 16px 20px; font-size: 14px; } }
  .callout svg { flex-shrink: 0; margin-top: 2px; }

  .tag.scenario { background: #2d6a4f; } .tag.assessment { background: #6b21a8; }
  .narrative { font-size: 13px; color: #344e41; line-height: 1.7; white-space: pre-line; background: #f4f8f4; border-radius: 10px; padding: 16px; margin-bottom: 20px; border-left: 4px solid #95d5b2; }
  @media(min-width:480px){ .narrative { font-size: 14px; padding: 20px; margin-bottom: 24px; } }
  .question-text { font-size: 14px; font-weight: 600; color: #1b4332; margin-bottom: 14px; }
  @media(min-width:480px){ .question-text { font-size: 15px; margin-bottom: 16px; } }
  .option-btn { display: block; width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 14px 16px; background: #fff; border: 2px solid #d8e2dc; border-radius: 10px; cursor: pointer; text-align: left; line-height: 1.5; color: #344e41; transition: all 0.2s; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
  @media(min-width:480px){ .option-btn { font-size: 14px; padding: 14px 18px; } }
  .option-btn:active:not(:disabled) { background: #f0f7f0; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { border-color: #2d6a4f; background: #edf7ed; }
  .option-btn.wrong { border-color: #c0392b; background: #fdf0ef; }
  .opt-label { font-weight: 700; margin-right: 8px; color: #52796f; }
  .feedback { border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  @media(min-width:480px){ .feedback { padding: 20px; } }
  .feedback.correct { background: #edf7ed; border: 1px solid #b7e4c7; }
  .feedback.wrong { background: #fdf0ef; border: 1px solid #f5c6cb; }
  .feedback-title { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
  .feedback-title.correct { color: #1b4332; } .feedback-title.wrong { color: #922b21; }
  .feedback-body { font-size: 13px; color: #344e41; line-height: 1.7; white-space: pre-line; }
  @media(min-width:480px){ .feedback-body { font-size: 14px; } }
  .takeaways { background: #f0f7f0; border-radius: 10px; padding: 16px; margin-bottom: 24px; }

  .assess-item.wrong { background: #fdf0ef; border-color: #f5c6cb; }

  @media(min-width:480px){ .assess-q { font-size: 14px; } }
  .tf-btns { display: flex; gap: 10px; }
  .tf-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 24px; border-radius: 6px; border: 2px solid #d8e2dc; background: #fff; color: #52796f; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .tf-btn:disabled { cursor: default; }
  .tf-btn.selected { border-color: #2d6a4f; background: #2d6a4f; color: #fff; }

  @media(min-width:480px){ .assess-explain { font-size: 13px; } }
  .assess-explain.correct { color: #2d6a4f; } .assess-explain.wrong { color: #922b21; }

  .score-box.pass { background: linear-gradient(135deg, #edf7ed, #d8f3dc); }
  .score-box.fail { background: linear-gradient(135deg, #fdf0ef, #fce8e6); }
  .score-num { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 8px; }
  .score-num.pass { color: #1b4332; } .score-num.fail { color: #922b21; }
  .score-msg { font-size: 14px; margin-bottom: 16px; }
  .score-msg.pass { color: #2d6a4f; } .score-msg.fail { color: #922b21; }
  .btn-retry { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 28px; background: #922b21; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .cert-box { background: linear-gradient(135deg, #f0f7f0, #d8f3dc); border: 2px solid #95d5b2; border-radius: 16px; padding: 28px 24px; max-width: 380px; margin: 0 auto 28px; }
  @media(min-width:480px){ .cert-box { padding: 32px 28px; margin-bottom: 32px; } }
  .cert-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: #52796f; margin-bottom: 16px; text-transform: uppercase; }
  .cert-name { font-family: 'Playfair Display', serif; font-size: 18px; color: #1b4332; margin-bottom: 4px; }
  .cert-course { font-size: 13px; color: #52796f; margin-bottom: 16px; }
  .cert-date { font-size: 12px; color: #7a8a7a; }
  .completion-note { font-size: 13px; color: #7a8a7a; line-height: 1.6; max-width: 420px; margin: 0 auto; }
  .footer { border-top: 1px solid #e8ede8; padding: 10px 20px; text-align: center; font-size: 10px; color: #a0b0a0; flex-shrink: 0; }
  @media(min-width:480px){ .footer { padding: 12px 28px; font-size: 11px; } }
  .text-right { text-align: right; }
  .hidden { display: none !important; }

  /* Welcome hero illustration */
  .welcome-illustration { margin-bottom: 20px; }
  .welcome-illustration svg { max-width: 200px; height: auto; }
</style>
</head>

const MODULES=[
{id:"welcome",title:"Welcome",type:"intro"},
{id:"overview",title:"What Is AI?",type:"content",icon:"brain",content:{heading:"Understanding AI at BVP",body:"Artificial Intelligence (AI) refers to software that processes information to generate content, recommendations, predictions, or decisions.\n\nAt BVP, AI tools are intended to assist staff \u2014 never to replace professional judgement or clinical expertise.\n\nExamples of AI tools include:",bullets:["Large language models such as ChatGPT or Claude","AI transcription or summarisation tools like Heidi Health","Automated rostering or scheduling systems","Data analysis or reporting tools"],callout:"This policy applies to any AI system used for BVP work or involving BVP data \u2014 whether the tool is provided by BVP or personally accessed on your own device."}},
{id:"approved-use",title:"Approved Uses",type:"content",icon:"checklist",content:{heading:"How AI Can Be Used at BVP",body:"AI may be used to support the following types of tasks at BVP:",bullets:["Clinical Support \u2014 Collecting, structuring, and summarising patient and client history during intake","Administrative Efficiency \u2014 Transcribing meetings, consultations, or phone calls (with consent); drafting routine emails or idea generation","Workflow Automation \u2014 Optimising rostering, inventory management, or billing","Operational Insights \u2014 Analysing trends in client feedback, consultation types, and appointment data","Human Resources \u2014 Supporting recruitment through CV screening, onboarding workflows, or employee surveys"],callout:"All AI outputs must be reviewed by a staff member before being used. The final decision must always be made by a human."}},
{id:"prohibited-use",title:"Prohibited Uses",type:"content",icon:"shield_x",content:{heading:"What AI Must Never Be Used For",body:"The following uses of AI are strictly prohibited at BVP. Breaching these rules may result in disciplinary action.",bullets:["Developing treatment plans or making clinical decisions","Diagnosing animals or providing veterinary advice","Making employment decisions (hiring, firing, performance outcomes)","Uploading confidential client or staff information to external AI tools","Any task that removes human oversight from clinical or employment decisions"],callout:"If in doubt about whether a use is appropriate, speak to your manager before proceeding."}},
{id:"data-privacy",title:"Data & Privacy",type:"content",icon:"lock",content:{heading:"Protecting Data & Privacy",body:"All use of AI must protect the privacy of clients, staff, and business information. Staff must not upload confidential or identifiable information into AI tools unless the system has been approved for use by BVP.",bullets:["Client details \u2014 names, contact information, account history","Patient records \u2014 clinical notes, treatment history, lab results","Staff information \u2014 personal details, performance records, rosters","Financial or business data \u2014 revenue, supplier contracts, pricing"],callout:"Any suspected data breach or inappropriate use of AI must be reported to a manager immediately. Do not wait."}},
{id:"security",title:"Security",type:"content",icon:"shield_check",content:{heading:"Security & Risk Mitigation",body:"AI systems at BVP must comply with our cybersecurity policy. The following protections are mandatory:",bullets:["Multi-factor authentication must be enabled on all AI platforms","AI software and related systems must be kept up to date","Data sharing settings that allow your input to be used for model training must be turned off before use","Risk assessments must be conducted by management before any new AI tool is introduced"],callout:"Free-tier AI tools often use your inputs to train their models. This means any data you enter could be stored, analysed, and potentially exposed. Always check privacy settings before use."}},
{id:"scenario-1",title:"Scenario 1",type:"scenario",icon:"phone",scenario:{title:"The Helpful Initiative",narrative:"Sam, a receptionist at BVP, has an idea to improve the client check-in process. On their lunch break, Sam opens ChatGPT on their personal phone using the free version.\n\nSam types: \"I work at a vet clinic. Here\u2019s how our current check-in process works \u2014 clients arrive, we look them up in our system by name, pull up their pet\u2019s history, confirm their address and phone number, and then the vet reviews the notes. Can you suggest a more efficient workflow?\"\n\nSam thinks this is harmless \u2014 they haven\u2019t named any clients or pets, and they\u2019re just brainstorming.",question:"What risks exist in Sam\u2019s approach, even though no specific client data was shared?",options:[
{id:"a",text:"There are no risks \u2014 Sam didn\u2019t share any personal data",correct:false,feedback:"Incorrect. Even without naming clients, Sam has described BVP\u2019s internal processes to an external, unapproved AI tool. Free-tier AI models like ChatGPT may store and use your inputs to train their models unless privacy settings are specifically configured. Sam\u2019s description of BVP\u2019s workflow is business information that could reveal operational vulnerabilities."},
{id:"b",text:"Sam used an unapproved tool and shared business process information that could be stored and used for model training",correct:true,feedback:"Correct. Even though Sam didn\u2019t share client names, several risks exist:\n\n\u2022 The free version of ChatGPT retains conversation data by default and may use it to train future models\n\u2022 BVP\u2019s internal workflows are business information covered by this policy\n\u2022 Sam used an unapproved AI tool for work purposes\n\u2022 Without checking privacy settings, Sam\u2019s input could be stored indefinitely on external servers\n\nThe right approach: Sam should raise the idea with their manager, who can determine if an approved AI tool can be used to develop the concept safely."},
{id:"c",text:"It\u2019s fine because Sam used their personal phone, not a BVP device",correct:false,feedback:"Incorrect. The policy applies whenever AI is used in connection with BVP work activities \u2014 regardless of the device. Using a personal phone does not exempt Sam from the policy. The key factor is that the AI was used for BVP work purposes with BVP-related information."}],keyTakeaways:["Free-tier AI tools often store your inputs and may use them for model training","Business process information is confidential \u2014 even without client names","The policy applies to all devices, including personal phones, when used for BVP work","Always check with your manager before using any AI tool that hasn\u2019t been approved by BVP"]}},
{id:"scenario-2",title:"Scenario 2",type:"scenario",icon:"mic",scenario:{title:"The Quick Transcription",narrative:"Dr. Patel has just finished a complex consultation with a distressed client whose dog requires surgery. The consultation was emotional and covered a lot of ground.\n\nDr. Patel wants to ensure accurate clinical notes, so they decide to use a free online transcription tool they found via a Google search. They upload the audio recording of the consultation, which includes the client\u2019s full name, their dog\u2019s name, the diagnosis, and the recommended treatment plan.",question:"What has Dr. Patel done wrong?",options:[
{id:"a",text:"Nothing \u2014 transcription tools are approved for use at BVP",correct:false,feedback:"Incorrect. While BVP does approve certain transcription tools (such as Heidi Health), Dr. Patel used an unapproved tool found via Google. Not all transcription tools are equal \u2014 approved tools have been assessed for privacy and security compliance."},
{id:"b",text:"Dr. Patel should have asked the client\u2019s permission first, but otherwise this is fine",correct:false,feedback:"Partially correct \u2014 consent is important, but even with consent, an unapproved tool cannot be used. The tool has not been risk-assessed by BVP, and confidential client and patient data has been uploaded to an unknown external platform."},
{id:"c",text:"Dr. Patel uploaded confidential client and patient data to an unapproved external AI tool",correct:true,feedback:"Correct. Dr. Patel has breached the policy in multiple ways:\n\n\u2022 Confidential client information (name, contact details implied by the consultation) was uploaded to an unapproved external tool\n\u2022 Patient clinical data (diagnosis, treatment plan) was shared with an unvetted platform\n\u2022 No risk assessment was conducted on the tool\n\u2022 The client was not informed their consultation recording would be processed by a third-party AI system\n\nThe right approach: Use BVP\u2019s approved transcription tool (Heidi Health), ensure the client is informed and has the option to opt out, and never upload recordings to unapproved platforms."}],keyTakeaways:["Only use BVP-approved transcription tools such as Heidi Health","Client names, patient records, and clinical data are confidential and must never be uploaded to unapproved tools","Clients must be informed when recordings or transcription tools are used","If unsure whether a tool is approved, ask your manager before using it"]}},
{id:"scenario-3",title:"Scenario 3",type:"scenario",icon:"cv",scenario:{title:"The Recruitment Shortcut",narrative:"BVP is hiring a new veterinary nurse. The practice manager, Jo, receives 45 applications. Feeling overwhelmed, Jo decides to upload all 45 CVs to ChatGPT and asks it to \"rank the top 10 candidates based on experience and qualifications.\"\n\nJo plans to use the AI\u2019s ranking to decide who gets an interview.",question:"What are the concerns with Jo\u2019s approach?",options:[
{id:"a",text:"AI can support CV screening, so this is a good use of initiative",correct:false,feedback:"Incorrect. While the policy does allow AI to support recruitment tasks like CV screening, Jo has uploaded personal information (names, addresses, qualifications, employment history) from 45 applicants to an external, unapproved AI tool. Additionally, Jo is planning to let the AI make the shortlisting decision rather than using it as a support tool."},
{id:"b",text:"Jo uploaded personal data to an unapproved tool and is allowing AI to make an employment decision",correct:true,feedback:"Correct. There are two critical issues:\n\n1. Data Breach Risk \u2014 CVs contain highly personal information (names, addresses, phone numbers, qualifications, work history). Uploading these to an unapproved AI tool breaches the data and privacy provisions of this policy.\n\n2. Employment Decision \u2014 The policy explicitly prohibits using AI to make employment decisions. By planning to use the AI\u2019s ranking to determine who gets an interview, Jo is removing human oversight from a decision that directly affects people\u2019s livelihoods.\n\nThe right approach: Use an approved AI tool (if available) to assist with organising or categorising applications, but the shortlisting decision must be made by a human based on their own assessment."},
{id:"c",text:"The only issue is that Jo should have used the paid version of ChatGPT",correct:false,feedback:"Incorrect. The version of the tool is not the primary concern. Even a paid AI tool would need to be approved by BVP before use. The fundamental issues are: uploading personal applicant data to an external platform, and allowing AI to make an employment decision without human oversight."}],keyTakeaways:["CVs and job applications contain personal data protected by privacy law and this policy","AI must never be used to make employment decisions \u2014 only to support them","Even HR and recruitment AI use must involve approved tools and human oversight","The shortlisting decision must always be made by a person, not an algorithm"]}},
{id:"scenario-4",title:"Scenario 4",type:"scenario",icon:"gift",scenario:{title:"The Free Tool Trap",narrative:"You discover a free AI tool online that promises to \"revolutionise veterinary practice management.\" It asks you to create an account using your work email and connect it to BVP\u2019s appointment system to \"unlock full features.\"\n\nThe tool\u2019s privacy policy is 47 pages long. You scroll to the bottom and click \"Accept.\"",question:"What should you have done differently?",options:[
{id:"a",text:"Read the full privacy policy before accepting",correct:false,feedback:"Reading the privacy policy is good practice, but it\u2019s not the first step. No staff member should be evaluating, creating accounts on, or connecting external AI tools to BVP systems without management approval. This requires a formal risk assessment."},
{id:"b",text:"Used a personal email instead of your work email",correct:false,feedback:"Incorrect. Using a personal email doesn\u2019t resolve the core issue. If the tool is being used for BVP work or connected to BVP systems, the policy applies regardless of which email address is used. The tool itself needs to be approved before any use."},
{id:"c",text:"Stopped and reported the tool to your manager for a risk assessment before creating an account or connecting any systems",correct:true,feedback:"Correct. The policy requires that risk assessments be conducted by management before introducing any new AI tools into BVP. You should:\n\n\u2022 Not create an account or connect any BVP systems\n\u2022 Report the tool to your manager\n\u2022 Allow management to conduct a risk assessment covering data security, privacy compliance, and suitability\n\u2022 Only use the tool if and when it has been formally approved\n\nFree tools often monetise through your data. Connecting one to BVP\u2019s appointment system could expose client records, appointment histories, and business data to an unknown third party."}],keyTakeaways:["Never create accounts on or connect unapproved AI tools to BVP systems","Free tools often monetise through data collection \u2014 if the product is free, you may be the product","All new AI tools require a management risk assessment before use","Report promising tools to your manager rather than testing them yourself"]}},
{id:"scenario-5",title:"Scenario 5",type:"scenario",icon:"meeting",scenario:{title:"The Performance Review Shortcut",narrative:"Lisa, a team leader at BVP, has just conducted a performance review with a staff member. She recorded the meeting using an organisation approved model with the staff member\u2019s knowledge and consent.\n\nThe tool generates a transcript and an AI-produced summary of the meeting, including key discussion points, agreed actions, and performance ratings discussed.\n\nLisa is running behind on admin and decides to save time by copying the AI-generated summary directly into the staff member\u2019s personnel file and emailing a copy to the staff member \u2014 without reading through it first.\n\nTwo weeks later, the staff member raises a concern. The AI summary states that Lisa \u201cexpressed concerns about the employee\u2019s ability to manage client relationships,\u201d when in reality, Lisa had praised their client skills and only noted one minor area for development around follow-up calls. The AI had misinterpreted the nuance of the conversation and produced an inaccurate characterisation that now sits on the employee\u2019s permanent record.",question:"What should Lisa have done differently?",options:[
{id:"a",text:"Lisa used an organisation approved model, so the process was fine \u2014 AI summaries are generally accurate enough for internal records",correct:false,feedback:"Incorrect. Even organisation approved models can misinterpret tone, nuance, and context \u2014 particularly in sensitive conversations like performance reviews. AI-generated summaries are a starting point, not a finished product. All AI outputs must be reviewed by a staff member before being used, and this is especially critical when the output will form part of a formal employment record."},
{id:"b",text:"Lisa should have reviewed and edited the AI-generated summary for accuracy before adding it to the personnel file or distributing it to the staff member",correct:true,feedback:"Correct. The policy is clear \u2014 AI outputs must always be reviewed by a staff member before being used. In the context of performance reviews, this is particularly important because:\n\n\u2022 AI can misinterpret tone, emphasis, and conversational nuance, turning a positive comment into a negative one\n\u2022 Performance records are formal documents that can have lasting consequences for an employee\u2019s career, pay, and development opportunities\n\u2022 Once inaccurate information is placed on file, it can be difficult to fully correct \u2014 even if amended later, the original record may have already influenced decisions\n\u2022 The staff member has a right to expect that their performance record accurately reflects what was discussed\n\nThe right approach: Always read AI-generated meeting summaries and transcripts in full before they are distributed, filed, or acted upon. For performance reviews specifically, it is good practice to share the summary with the staff member for their review and agreement before it is added to their personnel file."},
{id:"c",text:"Lisa should not have used a transcription tool for a performance review at all",correct:false,feedback:"Not quite. Using an organisation approved model for a performance review is acceptable, provided the staff member is informed and consents. The issue is not the recording or transcription \u2014 it\u2019s the failure to review the AI-generated output before it was filed and distributed. Transcription tools can be genuinely helpful for capturing detail in complex conversations, but the output must always be treated as a draft that requires human review."}],keyTakeaways:["AI-generated meeting summaries and transcripts must always be reviewed for accuracy before being distributed or added to any record","Performance reviews are sensitive documents \u2014 inaccurate AI summaries can have real consequences for an employee\u2019s career","Even when using an organisation approved model, the responsibility for accuracy sits with the person, not the AI","For performance reviews, best practice is to share the reviewed summary with the staff member for agreement before it is placed on file"]}},
{id:"assessment",title:"Assessment",type:"assessment",icon:"clipboard",questions:[

let currentIndex=0,userName="",started=false,visited=new Set(["welcome"]),
    assessAnswers={},assessSubmitted=false,completionDate="";

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}

function renderProgress(){const c=MODULES.filter(m=>m.type!=='intro'&&m.type!=='complete'),d=c.filter(m=>visited.has(m.id)).length,p=Math.round(d/c.length*100);document.getElementById('progressPct').textContent=p+'%';document.getElementById('progressFill').style.width=p+'%'}
function renderDots(){const w=document.getElementById('dotsWrap');w.innerHTML='';MODULES.forEach((m,i)=>{const d=document.createElement('button');d.className='dot'+(visited.has(m.id)?' visited':'')+(i===currentIndex?' active':'');d.title=m.title;d.onclick=()=>goTo(i);w.appendChild(d)})}
function goTo(i){currentIndex=i;visited.add(MODULES[i].id);render();document.getElementById('contentArea').scrollTop=0}
function goNext(){if(currentIndex<MODULES.length-1)goTo(currentIndex+1)}

function render(){
  const a=document.getElementById('contentArea'),m=MODULES[currentIndex];
  if(started){document.getElementById('progressWrap').classList.remove('hidden');document.getElementById('dotsWrap').classList.remove('hidden');renderProgress();renderDots()}
  if(m.type==='intro')a.innerHTML=renderWelcome();
  else if(m.type==='content')a.innerHTML=renderContent(m);
  else if(m.type==='scenario')a.innerHTML=renderScenario(m);
  else if(m.type==='assessment')a.innerHTML=renderAssessment(m);
  else if(m.type==='complete')a.innerHTML=renderCompletion();
}

function renderWelcome(){
  return `<div class="slide center">
    <div class="welcome-illustration">${SVG.welcome}</div>
    <h1>AI Policy Training</h1>
    <p class="subtitle">Ballarat Veterinary Practice</p>
    <div class="info-box">
      <p>This module covers responsible AI use at BVP. You will learn what is and isn\u2019t permitted, work through real-world scenarios, and complete a short assessment.</p>
      <p class="meta">Estimated time: 15\u201320 minutes</p>
    </div>
    <div class="name-wrap"><label>Enter your full name to begin</label>
    <input class="name-input" id="nameInput" type="text" placeholder="e.g. Jane Smith" value="${esc(userName)}"></div>
    <button class="btn-primary" id="startBtn" disabled onclick="started=true;goNext()">Begin Training \u2192</button></div>`;
}

function renderContent(m){
  const c=m.content;
  const icon=SVG[m.icon]||'';
  let b='';if(c.bullets)b='<ul class="bullet-list">'+c.bullets.map(x=>`<li>${esc(x)}</li>`).join('')+'</ul>';
  let co='';if(c.callout)co=`<div class="callout">${SVG.calloutIcon}<span>${esc(c.callout)}</span></div>`;
  return `<div class="slide">
    <div class="section-banner">${icon}<h2>${esc(c.heading)}</h2></div>
    <div class="body-text">${nl2br(c.body)}</div>${b}${co}
    <div class="text-right"><button class="btn-continue" onclick="goNext()">Continue \u2192</button></div></div>`;
}

function renderScenario(m){
  const s=m.scenario,sid=s.title.replace(/\s/g,'_'),icon=SVG[m.icon]||'';
  return `<div class="slide">
    <div class="scenario-header">
      <div class="scenario-header-text"><div class="tag scenario">Scenario</div><h2 style="margin-bottom:0">${esc(s.title)}</h2></div>
      <div class="scenario-icon">${icon}</div>
    </div>
    <div class="narrative">${nl2br(s.narrative)}</div>
    <p class="question-text">${esc(s.question)}</p>
    <div id="opts_${sid}">${s.options.map(o=>`<button class="option-btn" id="opt_${sid}_${o.id}" onclick="selectOption('${sid}','${o.id}')"><span class="opt-label">${o.id.toUpperCase()}.</span>${esc(o.text)}</button>`).join('')}</div>
    <div id="feedback_${sid}"></div></div>`;
}

function selectOption(sid,oid){
  const s=MODULES[currentIndex].scenario,ch=s.options.find(o=>o.id===oid);
  s.options.forEach(o=>{const b=document.getElementById('opt_'+sid+'_'+o.id);b.disabled=true;if(o.id===oid)b.className='option-btn '+(o.correct?'correct':'wrong')});
  document.getElementById('feedback_'+sid).innerHTML=`
    <div class="feedback ${ch.correct?'correct':'wrong'}"><div class="feedback-title ${ch.correct?'correct':'wrong'}">${ch.correct?'\u2713 Correct':'\u2717 Not quite'}</div><div class="feedback-body">${nl2br(ch.feedback)}</div></div>
    <div class="takeaways"><div class="takeaways-title">Key Takeaways</div><ul>${s.keyTakeaways.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>
    <div class="text-right"><button class="btn-continue" onclick="goNext()">Continue \u2192</button></div>`;
  setTimeout(()=>document.getElementById('feedback_'+sid).scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function renderAssessment(m){
  const qs=m.questions;assessAnswers={};assessSubmitted=false;
  const icon=SVG[m.icon]||'';
  return `<div class="slide">
    <div class="section-banner">${icon}<div><div class="tag assessment" style="margin-bottom:4px">Final Assessment</div><h2 style="font-size:22px;margin-bottom:0">Knowledge Check</h2></div></div>
    <p style="font-size:14px;color:#52796f;margin-bottom:28px">Mark each statement as True or False. You need 80% or higher to pass.</p>
    ${qs.map((q,i)=>`<div class="assess-item" id="assess_item_${i}"><p class="assess-q">${i+1}. ${esc(q.q)}</p><div class="tf-btns"><button class="tf-btn" id="tf_${i}_true" onclick="pickTF(${i},true)">True</button><button class="tf-btn" id="tf_${i}_false" onclick="pickTF(${i},false)">False</button></div><div id="assess_fb_${i}"></div></div>`).join('')}
    <div class="text-right" id="submitWrap"><button class="btn-continue" id="submitAssess" disabled onclick="submitAssessment()" style="background:#ccc;cursor:not-allowed">Submit Assessment</button></div>
    <div id="scoreArea"></div></div>`;
}

function pickTF(i,v){if(assessSubmitted)return;assessAnswers[i]=v;document.getElementById('tf_'+i+'_true').className='tf-btn'+(v===true?' selected':'');document.getElementById('tf_'+i+'_false').className='tf-btn'+(v===false?' selected':'');if(Object.keys(assessAnswers).length===MODULES[currentIndex].questions.length){const b=document.getElementById('submitAssess');b.disabled=false;b.style.background='#2d6a4f';b.style.cursor='pointer'}}

function submitAssessment(){
  assessSubmitted=true;const qs=MODULES[currentIndex].questions;let sc=0;
  qs.forEach((q,i)=>{const c=assessAnswers[i]===q.answer;if(c)sc++;document.getElementById('assess_item_'+i).className='assess-item '+(c?'correct':'wrong');document.getElementById('tf_'+i+'_true').disabled=true;document.getElementById('tf_'+i+'_false').disabled=true;document.getElementById('assess_fb_'+i).innerHTML=`<p class="assess-explain ${c?'correct':'wrong'}">${c?'\u2713':'\u2717'} ${esc(q.explanation)}</p>`});
  const passed=sc>=Math.ceil(qs.length*0.8);
  document.getElementById('submitWrap').innerHTML='';
  document.getElementById('scoreArea').innerHTML=`<div class="score-box ${passed?'pass':'fail'}"><div class="score-num ${passed?'pass':'fail'}">${sc}/${qs.length}</div><p class="score-msg ${passed?'pass':'fail'}">${passed?'You have passed the assessment.':'You did not reach the 80% pass mark. Please review the module content and try again.'}</p>${passed?'<button class="btn-continue" onclick="completeModule()">Complete Module \u2192</button>':'<button class="btn-retry" onclick="render()">Retry Assessment</button>'}</div>`;
  document.getElementById('scoreArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function completeModule(){
  completionDate=new Date().toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  goNext();
}

function renderCompletion(){
  return `<div class="slide center">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="80" height="80" style="margin-bottom:16px">
      <circle cx="40" cy="40" r="36" fill="#edf7ed" stroke="#95d5b2" stroke-width="2"/>
      <path d="M25 40l10 10 20-20" stroke="#2d6a4f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <h2 style="font-size:26px">Module Complete</h2>
    <p class="subtitle">Congratulations, ${esc(userName)}. You have completed the BVP AI Policy Training Module.</p>
    <div class="cert-box">
      <div class="cert-label">Certificate of Completion</div>
      ${SVG.welcome}
      <div class="cert-name">${esc(userName)}</div>
      <div class="cert-course">AI Policy Training \u2014 Ballarat Veterinary Practice</div>
      <div class="cert-date">Completed: ${esc(completionDate)}</div>
    </div>
    <div style="background:linear-gradient(135deg,#fef9ef,#fdf6e3);border:1px solid #e6d5a8;border-radius:12px;padding:20px;max-width:420px;margin:0 auto 24px;text-align:center">
      <p style="font-size:14px;color:#6b5a2e;margin-bottom:16px;line-height:1.6;font-weight:500">To complete your training record, please confirm by filling in the short form below.</p>
      <a href="https://forms.cloud.microsoft/r/LDkeNtTSCx" target="_blank" rel="noopener" style="display:inline-block;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px 36px;background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;border:none;border-radius:8px;cursor:pointer;text-decoration:none;letter-spacing:0.02em">Confirm Completion \u2192</a>
    </div>
    <p class="completion-note">If you have any questions about the AI policy, please speak with your manager.</p></div>`;
}

// ===== INIT =====
(function(){
  render();
  const bind=()=>{const inp=document.getElementById('nameInput');if(inp){inp.addEventListener('input',function(){userName=this.value;document.getElementById('startBtn').disabled=!this.value.trim()});inp.focus()}};
  setTimeout(bind,80);
  new MutationObserver(()=>{if(MODULES[currentIndex]?.type==='intro')setTimeout(bind,80)}).observe(document.getElementById('contentArea'),{childList:true});
})();
</script>
</body>
</html>
